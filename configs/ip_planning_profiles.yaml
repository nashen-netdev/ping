# IP 地址规划表 Ping 工具配置文件
# 定义多个项目环境，每个环境只需要指定 Excel 文件路径

# 环境配置格式：
# 环境名称:
#   name: "显示名称"
#   file: "Excel 文件路径"

# 金茂项目
jinmao:
  name: "金茂"
  file: "pass/IP地址规划表-金茂1.xlsx"

# XX IDC 项目（示例）
xxidc:
  name: "xxidc"
  file: "pass/IP地址规划表-xxidc.xlsx"

# XX 项目（示例）
xxproject:
  name: "xx项目"
  file: "pass/IP地址规划表-xxproject.xlsx"
